<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Chatbot</title>
  <style>
    :root {
      --bg-1: #f5efe6;
      --bg-2: #dce9e5;
      --panel: rgba(255, 252, 247, 0.84);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --ink: #1b2d2b;
      --muted: #61726f;
      --line: rgba(27, 45, 43, 0.1);
      --accent: #0f766e;
      --accent-2: #134e4a;
      --user-bubble: #e4f2ee;
      --bot-bubble: #fffaf2;
      --error: #b42318;
      --success: #166534;
      --shadow: 0 30px 80px rgba(26, 43, 40, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.1), transparent 28%),
        radial-gradient(circle at bottom right, rgba(19, 78, 74, 0.08), transparent 30%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
      pointer-events: none;
      opacity: 0.35;
    }

    .shell {
      width: min(980px, 100%);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      animation: fadeShell 0.55s ease;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 34px 34px 24px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.55));
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.18), transparent 70%);
      pointer-events: none;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: -40px;
      right: 180px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.7), transparent 72%);
      pointer-events: none;
      opacity: 0.65;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent-2);
      font-size: 0.84rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 0.94;
      font-weight: 700;
    }

    .subtitle {
      margin: 14px 0 0;
      max-width: 680px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 1rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 530px;
    }

    .sidebar {
      padding: 28px;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.48), rgba(255,255,255,0.2));
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      height: 550px;
      min-height: 550px;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 1.12rem;
    }

    .upload-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.94rem;
      font-weight: 600;
    }

    input,
    textarea,
    button {
      width: 100%;
      font: inherit;
    }

    input,
    textarea {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.86);
      color: var(--ink);
      padding: 13px 14px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.55;
    }

    .upload-actions,
    .composer-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      width: auto;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      padding: 13px 18px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.18s ease, background 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      background: var(--accent-2);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
      transform: none;
    }

    .ghost {
      background: #deefea;
      color: #164641;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--error);
    }

    .upload-meta {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.65);
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .chat-header {
      padding: 22px 26px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.3);
    }

    .chat-header-title {
      margin: 0;
      font-size: 1.08rem;
    }

    .chat-header-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .messages {
      flex: 1;
      min-height: 0;
      padding: 24px 24px 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0.08));
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: rgba(15, 118, 110, 0.38) transparent;
    }

    .messages::-webkit-scrollbar {
      width: 10px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(15, 118, 110, 0.28);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .empty-state {
      margin: auto;
      max-width: 500px;
      text-align: center;
      color: var(--muted);
      padding: 36px 24px;
      animation: fadeUp 0.5s ease;
    }

    .empty-state strong {
      display: block;
      color: var(--ink);
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .message-row {
      display: flex;
      animation: fadeUp 0.32s ease;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(78%, 680px);
      border-radius: 22px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      line-height: 1.6;
      box-shadow: 0 10px 24px rgba(20, 32, 30, 0.06);
      backdrop-filter: blur(8px);
    }

    .message-row.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 8px;
    }

    .message-row.bot .bubble {
      background: var(--bot-bubble);
      border-bottom-left-radius: 8px;
    }

    .bubble-label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0 2px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(15, 118, 110, 0.65);
      animation: bounce 0.9s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.24s;
    }

    .composer {
      padding: 18px 22px 22px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.36);
    }

    .composer textarea {
      min-height: 86px;
    }

    .response-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    @keyframes fadeShell {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.992);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.55;
      }
      40% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .chat-panel {
        height: 450px;
        min-height: 450px;
      }

      .bubble {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
 

    <section class="layout">
      <aside class="sidebar">
        <h2 class="section-title">Upload PDF</h2>
        <div class="upload-card">
          <label for="pdfFile">Choose File</label>
          <input id="pdfFile" type="file" accept="application/pdf,.pdf" />
          <div class="hint">Use a text-readable PDF. Max size 10 MB.</div>

          <div class="upload-actions">
            <button id="uploadBtn" type="button">Upload</button>
            <button id="clearBtn" type="button" class="ghost">Clear</button>
          </div>

          <p id="status" class="status"></p>
          <div id="uploadMeta" class="upload-meta">No PDF uploaded yet.</div>
        </div>
      </aside>

      <section class="chat-panel">
      

        <div id="messages" class="messages">
          <div id="emptyState" class="empty-state">
            <strong>Ready for your first question</strong>
            Upload a PDF, then send a message to see how the chatbot responds from that document.
          </div>
        </div>

        <div class="composer">
          <label for="question">Ask Question</label>
          <textarea id="question" placeholder="Type your message here and test the uploaded PDF..."></textarea>
          <div class="composer-actions">
            <button id="askBtn" type="button">Send Message</button>
          </div>
        
      </section>
    </section>
  </main>

  <script>
    const pdfFileInput = document.getElementById('pdfFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const askBtn = document.getElementById('askBtn');
    const questionInput = document.getElementById('question');
    const statusEl = document.getElementById('status');
    const uploadMetaEl = document.getElementById('uploadMeta');
    const messagesEl = document.getElementById('messages');
    const emptyStateEl = document.getElementById('emptyState');
    const baseUrl = window.location.origin;

    const setStatus = (message, type) => {
      statusEl.textContent = message || '';
      statusEl.className = `status${type ? ` ${type}` : ''}`;
    };

    const getReadableError = (error) => {
      if (window.location.protocol === 'file:') {
        return 'Open this page from the running server, not directly as a file. Use http://localhost:5000/';
      }

      if (error && /Failed to fetch/i.test(error.message || '')) {
        return `Could not reach the backend server at ${baseUrl}. Make sure npm start is running and open the page from the same server URL.`;
      }

      return error?.message || 'Request failed.';
    };

    const renderUploadMeta = (data) => {
      const doc = data?.pdfDocuments?.[0];
      if (!doc) {
        uploadMetaEl.textContent = 'No PDF uploaded yet.';
        return;
      }

      uploadMetaEl.textContent =
`File: ${doc.fileName || '-'}
Pages: ${doc.pageCount ?? '-'}
Sections: ${(doc.chunks || []).length}
Updated: ${data.updatedAt || '-'}`;
    };

    const hideEmptyState = () => {
      if (emptyStateEl) {
        emptyStateEl.style.display = 'none';
      }
    };

    const addMessage = (role, text) => {
      hideEmptyState();

      const row = document.createElement('div');
      row.className = `message-row ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const label = document.createElement('span');
      label.className = 'bubble-label';
      label.textContent = role === 'user' ? 'You' : 'Assistant';

      const body = document.createElement('div');
      body.textContent = text;

      bubble.appendChild(label);
      bubble.appendChild(body);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      row.scrollIntoView({ behavior: 'smooth', block: 'end' });

      return row;
    };

    const addTyping = () => {
      hideEmptyState();

      const row = document.createElement('div');
      row.className = 'message-row bot';
      row.id = 'typingRow';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const label = document.createElement('span');
      label.className = 'bubble-label';
      label.textContent = 'Assistant';

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';

      bubble.appendChild(label);
      bubble.appendChild(typing);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      row.scrollIntoView({ behavior: 'smooth', block: 'end' });

      return row;
    };

    const removeTyping = () => {
      const row = document.getElementById('typingRow');
      if (row) row.remove();
    };

    const loadKnowledge = async () => {
      try {
        const response = await fetch(`${baseUrl}/knowledge`);
        const data = await response.json();
        renderUploadMeta(data);
      } catch (error) {
        setStatus(getReadableError(error), 'error');
      }
    };

    uploadBtn.addEventListener('click', async () => {
      const file = pdfFileInput.files[0];
      if (!file) {
        setStatus('Please choose a PDF file.', 'error');
        return;
      }

      const formData = new FormData();
      formData.append('pdf', file);

      uploadBtn.disabled = true;
      setStatus('Uploading PDF...', '');

      try {
        const response = await fetch(`${baseUrl}/pdf-upload`, {
          method: 'POST',
          body: formData
        });
        const data = await response.json();

        if (!response.ok || !data.success) {
          setStatus(data.error || data.message || 'Upload failed.', 'error');
          return;
        }

        renderUploadMeta(data);
        setStatus('PDF uploaded successfully.', 'success');
      } catch (error) {
        setStatus(getReadableError(error), 'error');
      } finally {
        uploadBtn.disabled = false;
      }
    });

    clearBtn.addEventListener('click', async () => {
      clearBtn.disabled = true;
      setStatus('Clearing local PDF...', '');

      try {
        const response = await fetch(`${baseUrl}/knowledge`, { method: 'DELETE' });
        const data = await response.json();
        renderUploadMeta(data);
        setStatus('Local PDF cleared.', 'success');
      } catch (error) {
        setStatus(getReadableError(error), 'error');
      } finally {
        clearBtn.disabled = false;
      }
    });

    askBtn.addEventListener('click', async () => {
      const question = questionInput.value.trim();
      if (!question) {
        setStatus('Please enter a question.', 'error');
        return;
      }

      askBtn.disabled = true;
      setStatus('', '');
      addMessage('user', question);
      questionInput.value = '';
      addTyping();

      try {
        const response = await fetch(`${baseUrl}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await response.json();

        if (!response.ok || !data.success) {
          removeTyping();
          addMessage('bot', data.error || data.message || 'Could not get a response.');
          setStatus(data.error || data.message || 'Chat request failed.', 'error');
          return;
        }

        removeTyping();
        addMessage('bot', data.response || 'No response available.');
      } catch (error) {
        removeTyping();
        addMessage('bot', getReadableError(error));
        setStatus(getReadableError(error), 'error');
      } finally {
        askBtn.disabled = false;
      }
    });

    questionInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        askBtn.click();
      }
    });

    loadKnowledge();
  </script>
</body>
</html>
